<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>border</title>
    <style>
        .one {
            width: 0px;
            height: 0px;
            border: 100px solid;
            border-left-color: yellow;
            border-right-color: transparent;
            border-top-color: transparent;
            border-bottom-color: yellow;
            /*直角三角形，直角在左下角*/
        }

        .two {
            width: 0px;
            height: 0px;
            border: 100px solid;
            border-left-color: purple;
            border-right-color: transparent;
            border-top-color: purple;
            border-bottom-color: transparent;
            /*直角三角形，直角在左上角*/
        }

        .three {
            width: 0px;
            height: 0px;
            border: 100px solid;
            border-left-color: transparent;
            border-right-color: pink;
            border-top-color: pink;
            border-bottom-color: transparent;
            /*直角三角形，直角在右上角*/
        }

        .four {
            width: 0px;
            height: 0px;
            border: 100px solid;
            border-left-color: transparent;
            border-right-color: green;
            border-top-color: transparent;
            border-bottom-color: green;
            /*直角三角形，直角在右下角*/
        }

        .five {
            width: 0px;
            height: 0px;
            border: 100px solid;
            border-left: 173px solid yellow;
            border-right-color: transparent;
            border-top-color: transparent;
            border-bottom-color: transparent;
            /*正三角形*/
        }

        .six {
            width: 100px;
            height: 0px;
            border:100px solid;
            border-top-color:transparent;
            border-bottom-color:brown;
            border-right-color: transparent;
            border-left:0px;/*直角梯形*/
        }
    </style>
</head>

<body>
    <div class="one"></div>
    <br />
    <div class="two"></div>
    <br />
    <div class="three"></div>
    <br />
    <div class="four"></div>
    <br />
    <div class="five"></div>
    <br />
    <div class="six"></div>
</body>

</html>
