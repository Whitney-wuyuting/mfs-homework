<!DOCTYPE html>

<html>
    <head>
        <title>form</title>
    </head>
    <body>
        <form action="action_page.php" method="GET" enctype="multipart/form-data">
            <div>
                用户名：<input type="txt" name="username" placeholder="请输入用户名" /> 
            </div>
            <div>
                密码：<input type="password" name="password" />
            </div>
            <div>
                性别：<input type="radio" name="sex" value="1"/>男<input type="radio" name="sex" value="2"/>女
            </div>
            <div>
                技能：<input type="checkbox" name="skill" value="HTML"/>HTML<input type="checkbox" name="skill" value="CSS"/>CSS<input type="checkbox" name="skill" value="JavaScript"/>JavaScript
            </div>
            <div>
                所在城市：<select name="city">
                    <option></option>
                    <option value="Beijing">北京</option>
                    <option value="Shanghai">上海</option>
                    <option value="Shenzhen"> 深圳</option>
                </select>
            </div>
            <button name="submit">提交</button>
            <button type="reset" name="reset">重置</button>
        </form>
    </body>
</html>
