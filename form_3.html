<!DOCTYPE html>

<html>
    <head>
        <title>form_3</title>
    </head>
    <body>
        <form action="action_page.php" method="GET">
            <div>
                电子邮箱：<input type="email" name="email" required/>
            </div>
            <div>
                输入0到100之间的某个偶数：<input type="number" min="0" max="100" step="2"/>
            </div>
            <div>
                城市：<input list="city">
                <datalist id="city">
                    <option>北京</option>
                    <option>上海</option>
                    <option>广州</option>
                    <option>深圳</option>
                </datalist>
            </div>
            <button>提交</button>
        </form>
    </body>
</html>
