<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>labs</title>
    <style>
        .labs {
            display: flex;
            height: 50px;
            width: 400px;
            background-color: rgb(0, 188, 212);
            justify-content: center;
            align-items: center;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .lab {
            width: 200px;
            text-align: center;
            color: rgb(255, 255, 255);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;

        }

        .lab:active {
            color: rgb(255, 255, 255, 0.5)
        }

        .content {
            height: 200px;
            width: 400px;
            background-color: lightgray;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .hidden {
            display: none;
        }

        .content div {
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="labs">
        <div class="lab">lab1</div>
        <div class="lab">lab2</div>
    </div>
    <div class="content">
        <div>lab1的内容</div>
        <div>lab2的内容</div>
    </div>
    <script>
        var labs = document.getElementsByClassName("lab")
        var divs = document.querySelectorAll(".content div")
        for (var i = 0; i < labs.length; i++) {
            (function (i) {
                labs[i].onclick = function () {
                    for (var j = 0; j < divs.length; j++) {
                        divs[j].className = "hidden"
                    }
                    divs[i].className = ""
                }
            })(i)
        }
        for (var j = 0; j < divs.length; j++) {
            divs[j].className = "hidden"
        }
        divs[0].className = ""
    </script>
</body>

</html>
