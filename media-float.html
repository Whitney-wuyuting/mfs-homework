<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>media-float</title>
    <style>
        [class*="col-"] {
            background-color: lightpink;
            width: 80px;
            height: 80px;
            border-radius: 10px;
            margin: 5px 10px;
            float: left;
        }

        .placehold {
            width: 80px;
            margin: 0 10px;
            float: left;
        }

        @media only screen and (max-width: 768px) {
            .container [class*="col-"]{
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="col-1"></div>
        <div class="col-2"></div>
        <div class="col-3"></div>
        <div class="col-4"></div>
        <div class="col-5"></div>
        <div class="col-6"></div>
        <div class="col-7"></div>
        <div class="col-8"></div>
        <div class="col-9"></div>
        <div class="col-10"></div>
        <div class="col-11"></div>
        <div class="col-12"></div>
        <div class="placehold"></div>
        <div class="placehold"></div>
        <div class="placehold"></div>
    </div>
</body>

</html>
