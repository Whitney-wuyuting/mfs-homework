<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>GrailLayout</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
        }

        .header,
        .footer {
            height: 60px;
            background: plum;
            text-align: center;
            line-height: 60px;
            flex-shrink: 0;
        }

        .header{
            order:-1;
        }

        .section {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }

        .left,
        .right {
            width: 60px;
            background: pink;
            text-align: center;
            height: 480px;
            line-height: 480px;
            flex-shrink: 0;
        }

        .left{
            order:-1;
        }

        .middle {
            background: rgb(226, 86, 107);
            flex-grow: 1;
            text-align: center;
            line-height: 480px;
        }
    </style>
</head>

<body>
    <div class="container">
        <section class="section">
            <div class="middle">中</div>
            <div class="left">左</div>
            <div class="right">右</div>
        </section>
        <header class="header">头部</header>
        <footer class="footer">尾部</footer>

    </div>
</body>

</html>
