<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll</title>
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
    <style>
        .top {
            height: 40px;
        }

        .nav {
            height: 40px;
            width: 500px;
            background-color: yellowgreen;
            margin: 0 auto;
            top: 0;
            left: 0;
            right: 0;
        }

        .body {
            height: 2000px;
            width: 500px;
            background-color: lightgray;
            margin: 0 auto;
        }

        .fixed {
            position: fixed;
        }

        .back-top-btn {
            height: 38px;
            width: 38px;
            line-height: 38px;
            background-color: yellowgreen;
            color: white;
            text-align: center;
            font-size: 25px;
            position: fixed;
            right: 40px;
            bottom: 40px;
            cursor: pointer;
            display: none;
        }
        .show{
            display: block;
        }
    </style>
</head>

<body>
    <div class="top"></div>
    <div class="nav"></div>
    <div class="body"></div>
    <div class="back-top-btn">^</div>
    <script>

        window.onscroll=function(){
            if(window.scrollY>500){
                $(".back-top-btn").addClass("show")
                $(".nav").addClass("fixed")
            }
            else if(window.scrollY > 40)
            {
                $(".back-top-btn").removeClass("show")
                $(".nav").addClass("fixed")
            }
            else{
                $(".back-top-btn").removeClass("show")
                $(".nav").removeClass("fixed")
            }
        }
        $(".back-top-btn").click(function(){
            window.scroll(0,0);
        })
    </script>
</body>

</html>
