<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传统方法实现圣杯布局</title>
    <style>
        #bd{
            padding-left: 200px;
            padding-right: 100px;
        }
        .main{
            background-color: lightblue;
            float: left;
            width: 100%;
        }
        .sub{
            background-color: lightpink;
            width: 200px;
            float: left;
            margin-left: -100%;
            position: relative;
            left: -200px;
        }
        .extra{
            background-color: lightsalmon;
            width: 100px;
            float: left;
            margin-left: -100px;
            position: relative;
            right: -100px;
        }
    </style>
</head>

<body>
    <div id="bd">
        <div class="main">main</div>
        <div class="sub">sub</div>
        <div class="extra">extra</div>
    </div>
</body>

</html>
