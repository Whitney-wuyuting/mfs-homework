<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>sprite</title>
    <style>
        input {
            display: block;
            width: 48px;
            height: 35px;
            background-image: url(https://upload-images.jianshu.io/upload_images/12983944-a0431d69343bb1a7.jpg);
            background-repeat: no-repeat;
        }

        input:hover {
            background-position: -50px 0px;
        }

        input:active {
            background-position: -186px 0px;
        }
    </style>
</head>

<body>
    <input type="button" class="btn" />
</html>
